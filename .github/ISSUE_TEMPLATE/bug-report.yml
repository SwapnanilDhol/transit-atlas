name: Bug report
description: Report incorrect behavior in the app, tooling, or data
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: region
    attributes:
      label: Region, route, or station
      placeholder: in-maa / MTC 21G
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, source links, or logs
